  {id:"identity",nav:"Creator Identity",icon:"00",heading:"Creator Identity",subheading:"Define how you show up before you create anything.",
   customFields:[
     {key:"niche",label:"What space do you create in?",type:"select",step:"Step 1 — Define your space",stepNote:"This shapes where you sit and how you are perceived.",options:["Choose what feels closest","Fashion","Beauty","Fitness & Health","Lifestyle","Business & Entrepreneurship","Finance & Wealth","Food & Cooking","Travel","Parenting & Family","Couples & Relationships","Faith & Spirituality","Comedy & Entertainment","Home & Interiors","Arts & Crafts","Gaming","Music","Education","Personal Development","UGC Creator","Other"]},
     {key:"creatorType",label:"What type of creator are you?",guidance:"Choose the style that feels most natural. This shapes how your audience connects with you.",type:"select",options:["Choose what feels closest","Educator — I teach and share knowledge (great for experts)","Entertainer — I make people laugh or feel good","Lifestyle — I share how I live (great for beginners)","Business owner — I sell products or services","Coach or consultant — I help people transform","Storyteller — I share experiences and journeys","Motivator — I inspire and uplift","Behind the brand — faceless or product-led","Character or persona — I use an alter ego","Exploring my direction"]},
     {key:"visibility",label:"How do you feel comfortable appearing online?",guidance:"There is no wrong answer. This determines how your content will be received.",type:"select",options:["Choose what feels closest","Full face on camera — I am the brand","Voice only — I speak but stay off camera","Faceless — text and aesthetics only (great if camera feels uncomfortable)","Using a character or persona","Behind the scenes — rarely showing myself","A mix — depends on the content"]},
     {key:"enjoys",label:"What do you enjoy in your own time?",type:"select",step:"Step 2 — Define your presence",stepNote:"This determines how people experience you.",options:["Choose what feels closest","Faith and worship","Reading","Walking and being in nature — slow living","Cooking and experimenting with food","Fashion and getting dressed up","Fitness and movement","Gaming","Art and creativity","Home decorating and interiors","Travelling and exploring","Spending time with family","Music — listening or making it","Watching romantic films","Watching documentaries or world events","Socialising and going out","Quiet time and slow living","Business and self-development","Beauty and self-care","Sports — watching or playing","Comedy and laughter"]},
     {key:"values",label:"What matters most to you?",type:"select",options:["Choose what feels closest","Faith and spirituality","Family above everything","Authenticity and being real","Luxury and aspiration","Education and growth","Empowerment and lifting others","Humour and joy","Community and belonging","Health and wellness","Financial freedom","All of the above"]},
     {key:"style",label:"How would you describe your vibe?",guidance:"This is not about what is trendy. It is about what feels true to you.",type:"select",options:["Choose what feels closest","Clean and minimal — simple, calm, intentional","Bold and colourful — loud, expressive, confident","Raw and real — unfiltered, honest, vulnerable","Soft and feminine — gentle, warm, elegant","Dark and editorial — moody, high fashion, dramatic","Warm and cosy — homely, inviting, safe","Professional and polished — sharp, credible, expert","Playful and fun — lighthearted, vibrant, energetic"]},
     {key:"platform",label:"Where do you mainly want to show up?",type:"select",options:["Choose what feels closest","TikTok","Instagram","YouTube","Pinterest","Twitter / X","LinkedIn","Podcast","Blog or Newsletter","Multiple platforms","I have not decided yet"]},
     {key:"audience",label:"Who do you create for?",guidance:"This guides how you grow and how your content monetises.",type:"select",step:"Step 3 — Define your direction",stepNote:"This guides how you grow and monetise.",options:["Choose what feels closest","Women building a business or income online","Mums juggling family and ambition","Young women finding their identity","Men in business or finance","Couples building a life together","Parents looking for connection and support","People on a faith journey","People working on their fitness or health","People interested in fashion and beauty","People interested in home and lifestyle","Anyone who needs motivation and uplift","I am not sure yet"]},
     {key:"goal",label:"What would success look like for you?",type:"select",options:["Choose what feels closest","Brand deals and sponsorships","Selling my own products or courses","Building a loyal community","Going viral and growing fast","Earning passive income","Being recognised as an expert in my space","Creative expression and being seen","All of the above"]},
     {key:"incomeGoal",label:"How do you want to earn from your content?",guidance:"Be honest. This shapes the direction your identity points toward.",type:"select",options:["Choose what feels closest","Brand partnerships and sponsorships","Selling my own digital or physical products","Affiliate marketing","Coaching or consulting","Online courses or memberships","Multiple income streams","I have not thought about it yet"]},
     {key:"wontPost",label:"What would you never post?",type:"select",options:["Choose what feels closest","My face","My personal or home life","Controversial or political opinions","Explicit or suggestive content","Anything that feels like selling","Nothing — I am open to everything"]},
   ],
   prompt:(f)=>`You are a brand strategist for creators. Build a detailed Creator Identity profile based on these answers:\n- Space they create in: "${f.niche}"\n- Type of creator: "${f.creatorType||"Not specified"}"\n- How they show up online: "${f.visibility||"Not specified"}"\n- What they enjoy in their own time: "${f.enjoys||"Not specified"}"\n- What matters most to them: "${f.values||"Not specified"}"\n- Their content vibe and aesthetic: "${f.style||"Not specified"}"\n- Primary platform: "${f.platform||"Not specified"}"\n- Who they create for: "${f.audience||"Not specified"}"\n- What success looks like: "${f.goal||"Not specified"}"\n- How they want to earn: "${f.incomeGoal||"Not specified"}"\n- What they would never post: "${f.wontPost||"Not specified"}"\n\n**CREATOR ARCHETYPE** — What type of creator are they and why. Be specific.\n**YOUR UNIQUE CREATOR IDENTITY** — What makes this creator genuinely different from everyone else in their space. Be direct and specific — no generic statements.\n**CORE VALUES & WHAT YOU STAND FOR** — 5 values this creator should own publicly. For each: the value name + one powerful sentence on how it shows up in their content.\n**YOUR BRAND VOICE** — Describe their tone, energy and how they communicate. Include 6 phrases that feel authentic to them.\n**CONTENT PILLARS** — 5 core themes this creator should own. For each: pillar name, why it works for them specifically, and 3 content angle ideas with hooks.\n**WHAT YOU WILL AND WON'T BE** — A clear list of what this creator stands for and what they don't. This is their brand boundary.\n**HOW TO SHOW UP** — Based on their visibility preference (${f.visibility||"not specified"}), specific advice on how to build presence without compromising who they are.\n**DREAM COLLABORATIONS** — 5 specific brands or creators they should target for partnerships and why.\n**CREATOR MISSION STATEMENT** — One powerful sentence. Who they are, who they serve, and what change they create.\n**YOUR BIO** — Two versions: (1) Third person — for press, media kits and websites. (2) First person — for social profiles. Both under 80 words.\n\nBe specific, premium and strategic. This is not generic advice. Speak directly to this person's actual identity.`},
  {id:"persona",nav:"Client Profile",icon:"01",heading:"Client Profile",subheading:"Understand exactly who your ideal customer is.",

function saveStyleProfile(concept, visualStyle, continuityLock, contentTone){
  try{
    localStorage.setItem("cs_profile", JSON.stringify({
      concept: concept?.slice(0,800)||"",
      visualStyle: visualStyle||"",
      continuityLock: continuityLock?.slice(0,400)||"",
      contentTone: contentTone||"",
      saved: new Date().toISOString()
    }));
  }catch(e){}
}

function getStyleContext(){
  try{
    const raw = localStorage.getItem("cs_profile");
    if(!raw) return "";
    const p = JSON.parse(raw);
    if(!p.concept) return "";
    return `\n\n---\nCREATOR STYLE PROFILE (from Creator Stylist):\nConcept foundation: ${p.concept}\nVisual style: ${p.visualStyle}\nContent tone: ${p.contentTone}\nContinuity lock: ${p.continuityLock}\nUse this to personalise the output to this specific creator's identity, tone and aesthetic. Do not mention this profile explicitly — just let it shape the output.\n---`;
  }catch(e){ return ""; }
}

async function callAPI(prompt){
  const styleCtx=getStyleContext();
  const r=await fetch("/.netlify/functions/claude-generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:prompt+styleCtx})});
  const ct=r.headers.get("content-type")||"";
  if(!ct.includes("application/json")){
    const txt=await r.text();
    throw new Error("Server error ("+r.status+"). Check that your Netlify function is deployed and your OPENAI_API_KEY is set in Netlify environment variables.");
  }
  const d=await r.json();
  if(!d.success)throw new Error(d.error||"Generation failed — check Netlify function logs");
  return d.result;
}

function TW({text}){
  const [s,setS]=useState("");const [done,setDone]=useState(false);
  useEffect(()=>{setS("");setDone(false);let i=0;const id=setInterval(()=>{i++;setS(text.slice(0,i));if(i>=text.length){clearInterval(id);setDone(true);}},4);return()=>clearInterval(id);},[text]);
  return html`<span class="out">${s}${!done&&html`<span style=${{opacity:0.3}}>|</span>`}</span>`;
}

                <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <p style=${{fontSize:9,letterSpacing:4,color:GD,fontFamily:FFB,fontWeight:600}}>YOUR CONCEPT</p>
                  <button onClick=${()=>navigator.clipboard.writeText(csConcept)} style=${{fontSize:10,color:GD,background:"none",border:`1px solid ${BO}`,cursor:"pointer",padding:"5px 12px",borderRadius:3,fontFamily:FFB}}>Copy</button>
                </div>
                <pre style=${{fontSize:13,color:MT,fontFamily:FFB,lineHeight:1.9,whiteSpace:"pre-wrap",margin:0}}>${csConcept}</pre>
              </div>
              ${csStep===1&&html`
                ${csErr&&html`<p style=${{color:"#e07070",fontSize:13,fontFamily:FFB,marginBottom:12}}>${csErr}</p>`}
                <button onClick=${async()=>{
                  setCsErr("");setCsStylistLoad(true);
                  try{
                    const r=await fetch("/.netlify/functions/creator-stylist-scenes",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({concept:csConcept,...csFields})});
                    const d=await r.json();
                    if(d.error)throw new Error(d.error);
                    setCsScenes(d.result);setCsStep(2);
                  }catch(e){setCsErr(e.message);}
                  finally{setCsStylistLoad(false);}
                }} disabled=${csStylistLoad} style=${{background:csStylistLoad?"rgba(160,112,48,0.4)":GD,color:IV,border:"none",cursor:csStylistLoad?"not-allowed":"pointer",fontSize:13,fontWeight:600,padding:"16px 36px",borderRadius:4,fontFamily:FFB,letterSpacing:1.5}}>
                  ${csStylistLoad?"Building scenes...":"2. Build Scenes →"}
                </button>`}`}

            <!-- SCENES STORYBOARD -->
            ${csStep>=2&&csScenes&&html`
              <div style=${{marginBottom:20}}>
                <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <p style=${{fontSize:9,letterSpacing:4,color:GD,fontFamily:FFB,fontWeight:600}}>SCENE BREAKDOWN</p>
                  <button onClick=${()=>navigator.clipboard.writeText(csScenes)} style=${{fontSize:10,color:GD,background:"none",border:`1px solid ${BO}`,cursor:"pointer",padding:"5px 12px",borderRadius:3,fontFamily:FFB}}>Copy All</button>
                </div>
                <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:12,marginBottom:16}}>
                  ${(()=>{
                    const parts=csScenes.split(/(?=SCENE \d+:)/i).filter(s=>s.trim());
                    return parts.map((s,i)=>html`
                      <div key=${i} style=${{background:CR,border:`1px solid ${BO}`,borderRadius:6,padding:"16px 18px"}}>
                        <p style=${{fontSize:9,letterSpacing:3,color:GD,fontFamily:FFB,fontWeight:600,marginBottom:8}}>SCENE ${i+1}</p>
                        <pre style=${{fontSize:12,color:MT,fontFamily:FFB,lineHeight:1.8,whiteSpace:"pre-wrap",margin:"0 0 10px"}}>${s.replace(/^SCENE \d+:\s*/i,"").trim().slice(0,380)}${s.length>380?"...":""}</pre>
                        <button onClick=${()=>navigator.clipboard.writeText(s.trim())} style=${{fontSize:10,color:GD,background:"none",border:`1px solid ${BO}`,cursor:"pointer",padding:"4px 10px",borderRadius:3,fontFamily:FFB}}>Copy</button>
                      </div>`);
                  })()}
                </div>
                ${csStep===2&&html`
                  ${csErr&&html`<p style=${{color:"#e07070",fontSize:13,fontFamily:FFB,marginBottom:12}}>${csErr}</p>`}
                  <button onClick=${async()=>{
                    setCsErr("");setCsStylistLoad(true);
                    try{
                      const r=await fetch("/.netlify/functions/creator-stylist-production",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({concept:csConcept,scenes:csScenes,...csFields})});
                      const d=await r.json();
                      if(d.error)throw new Error(d.error);
                      setCsProduction(d.result);
                      const marker="IMAGE PROMPT:";
                      const start=d.result.indexOf(marker);
                      if(start!==-1){const after=d.result.slice(start+marker.length);const next=after.search(/VIDEO PROMPT:|CAMERA DIRECTION:|LIGHTING:/i);setCsImagePrompt(next===-1?after.trim():after.slice(0,next).trim());}
                      const clMarker="GLOBAL CONTINUITY LOCK:";
                      const clStart=d.result.lastIndexOf(clMarker);
                      if(clStart!==-1)setCsContinuityLock(d.result.slice(clStart+clMarker.length).trim().slice(0,500));
                      setCsStep(3);
                    }catch(e){setCsErr(e.message);}
                    finally{setCsStylistLoad(false);}
                  }} disabled=${csStylistLoad} style=${{background:csStylistLoad?"rgba(160,112,48,0.4)":GD,color:IV,border:"none",cursor:csStylistLoad?"not-allowed":"pointer",fontSize:13,fontWeight:600,padding:"16px 36px",borderRadius:4,fontFamily:FFB,letterSpacing:1.5}}>
                    ${csStylistLoad?"Building production...":"3. Generate Production →"}
                  </button>`}
              </div>`}

            <!-- PRODUCTION OUTPUT -->
            ${csStep>=3&&csProduction&&html`
              <div style=${{background:CR,border:`1px solid ${BO}`,borderRadius:6,padding:"24px",marginBottom:20}}>
                <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <p style=${{fontSize:9,letterSpacing:4,color:GD,fontFamily:FFB,fontWeight:600}}>PRODUCTION DIRECTION</p>
                  <button onClick=${()=>navigator.clipboard.writeText(csProduction)} style=${{fontSize:10,color:GD,background:"none",border:`1px solid ${BO}`,cursor:"pointer",padding:"5px 12px",borderRadius:3,fontFamily:FFB}}>Copy All</button>
                </div>
                <pre style=${{fontSize:13,color:MT,fontFamily:FFB,lineHeight:1.9,whiteSpace:"pre-wrap",margin:0}}>${csProduction}</pre>
              </div>
              ${csStep===3&&html`
                ${csErr&&html`<p style=${{color:"#e07070",fontSize:13,fontFamily:FFB,marginBottom:12}}>${csErr}</p>`}
                <button onClick=${async()=>{
                  setCsErr("");setCsStylistLoad(true);
                  try{
                    const r=await fetch("/.netlify/functions/creator-stylist-content",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({concept:csConcept,scenes:csScenes,production:csProduction,...csFields})});
                    const d=await r.json();
                    if(d.error)throw new Error(d.error);
                    setCsContent(d.result);setCsStep(4);
                    // Save Creator Stylist profile to bridge
                    saveStyleProfile(csConcept, csFields.visualStyle||csFields.mood||csFields.visualStyle, csContinuityLock, d.result?.slice(0,200));
                    setHasStyleProfile(true);
                  }catch(e){setCsErr(e.message);}
                  finally{setCsStylistLoad(false);}
                }} disabled=${csStylistLoad} style=${{background:csStylistLoad?"rgba(160,112,48,0.4)":GD,color:IV,border:"none",cursor:csStylistLoad?"not-allowed":"pointer",fontSize:13,fontWeight:600,padding:"16px 36px",borderRadius:4,fontFamily:FFB,letterSpacing:1.5}}>
                  ${csStylistLoad?"Packaging content...":"4. Package for TikTok →"}
                </button>`}`}

            <!-- CONTENT + HOOKS -->
            ${csStep>=4&&csContent&&html`
              <div style=${{marginBottom:20}}>
                <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <p style=${{fontSize:9,letterSpacing:4,color:GD,fontFamily:FFB,fontWeight:600}}>CONTENT PACKAGE</p>
                  <button onClick=${()=>navigator.clipboard.writeText(csContent)} style=${{fontSize:10,color:GD,background:"none",border:`1px solid ${BO}`,cursor:"pointer",padding:"5px 12px",borderRadius:3,fontFamily:FFB}}>Copy All</button>
                </div>
                ${(()=>{
                  const hookMatch=csContent.match(/HOOK OPTIONS?:([^]*?)(?=ON-SCREEN|CAPTION)/i);
                  const hooks=hookMatch?hookMatch[1].trim().split(/
+/).filter(h=>h.trim().length>8&&!/^HOOK/i.test(h.trim())):[];
                  return hooks.length>0?html`
                    <p style=${{fontSize:10,letterSpacing:2,color:MT,fontFamily:FFB,marginBottom:10,marginTop:4}}>SELECT YOUR HOOK — TAP TO COPY</p>
                    <div style=${{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
                      ${hooks.slice(0,5).map((h,i)=>html`
                        <button key=${i} onClick=${()=>{setCsHookSelected(h);navigator.clipboard.writeText(h.replace(/^\d+\.\s*/,""));}}
                          style=${{textAlign:"left",padding:"14px 18px",borderRadius:4,cursor:"pointer",fontFamily:FFB,fontSize:13,
                            border:`1px solid ${csHookSelected===h?GD:BO}`,
                            background:csHookSelected===h?"rgba(160,112,48,0.1)":CR,
                            color:csHookSelected===h?GD:MT}}>
                          ${csHookSelected===h?"✓  ":""}${h.replace(/^\d+\.\s*/,"")}
                        </button>`)}
                    </div>`:null;
                })()}
                <div style=${{background:CR,border:`1px solid ${BO}`,borderRadius:6,padding:"24px",marginBottom:20}}>
                  <pre style=${{fontSize:13,color:MT,fontFamily:FFB,lineHeight:1.9,whiteSpace:"pre-wrap",margin:0}}>${csContent}</pre>
                </div>
              </div>

              <!-- IMAGE GENERATION -->
              <div style=${{background:ESP,borderRadius:8,padding:"28px",marginBottom:20}}>
                <p style=${{fontSize:9,letterSpacing:4,color:GD,fontFamily:FFB,fontWeight:600,marginBottom:6}}>GENERATE YOUR IMAGE</p>
                <p style=${{fontSize:12,color:"rgba(250,246,240,0.45)",fontFamily:FFB,marginBottom:14}}>Auto-populated from your production prompt. Edit as needed.</p>
                <textarea style=${{...FI,fontSize:13,minHeight:100,marginBottom:12,background:"rgba(0,0,0,0.3)",color:IV}} placeholder="Image prompt..." value=${csImagePrompt} onInput=${e=>setCsImagePrompt(e.target.value)}></textarea>
                <div style=${{display:"flex",gap:10,marginBottom:16}}>
                  ${["vivid","natural"].map(s=>html`<button key=${s} onClick=${()=>setCsImageStyle(s)} style=${{fontSize:11,padding:"8px 16px",borderRadius:4,cursor:"pointer",fontFamily:FFB,border:"1px solid",background:csImageStyle===s?GD:"rgba(255,255,255,0.07)",color:csImageStyle===s?IV:"rgba(250,246,240,0.65)",borderColor:csImageStyle===s?GD:"rgba(250,246,240,0.2)"}}>${s.charAt(0).toUpperCase()+s.slice(1)}</button>`)}
                </div>
                ${csErr&&html`<p style=${{color:"#e07070",fontSize:13,fontFamily:FFB,marginBottom:12}}>${csErr}</p>`}
                <button onClick=${async()=>{
                  if(!csImagePrompt.trim()){setCsErr("Please enter an image prompt.");return;}
                  setCsErr("");setCsStylistLoad(true);setCsImage("");
                  try{
                    const r=await fetch("/.netlify/functions/creator-stylist-image",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({imagePrompt:csImagePrompt,style:csImageStyle})});
                    const d=await r.json();
                    if(d.error)throw new Error(d.error);
                    setCsImage(d.image);
                    setCsPromptLibrary(prev=>[{prompt:csImagePrompt,image:d.image},...prev].slice(0,10));
                  }catch(e){setCsErr(e.message);}
                  finally{setCsStylistLoad(false);}
                }} disabled=${csStylistLoad} style=${{background:csStylistLoad?"rgba(160,112,48,0.4)":GD,color:IV,border:"none",cursor:csStylistLoad?"not-allowed":"pointer",fontSize:13,fontWeight:600,padding:"16px 32px",borderRadius:4,fontFamily:FFB,letterSpacing:1.5,marginBottom:16}}>
                  ${csStylistLoad?"Generating...":"Generate Image →"}
                </button>
                ${csImage&&html`<div style=${{marginBottom:16}}>
                  <img src=${csImage} alt="Generated" style=${{width:"100%",maxWidth:460,borderRadius:6,display:"block",marginBottom:12}}/>
                  <a href=${csImage} download="creator-stylist.png" style=${{fontSize:11,color:IV,background:BUT,padding:"10px 20px",borderRadius:3,fontFamily:FFB,textDecoration:"none",letterSpacing:1}}>↓ Download Image</a>
                </div>`}
              </div>

              <!-- PROMPT LIBRARY -->
              ${csPromptLibrary.length>0&&html`
                <div style=${{background:CR,border:`1px solid ${BO}`,borderRadius:6,padding:"24px",marginBottom:20}}>
                  <p style=${{fontSize:9,letterSpacing:4,color:GD,fontFamily:FFB,fontWeight:600,marginBottom:16}}>PROMPT LIBRARY — THIS SESSION</p>
                  ${csPromptLibrary.map((item,i)=>html`
                    <div key=${i} style=${{display:"flex",gap:12,alignItems:"flex-start",paddingBottom:12,marginBottom:12,borderBottom:i<csPromptLibrary.length-1?`1px solid ${BO}`:"none"}}>
                      ${item.image&&html`<img src=${item.image} style=${{width:56,height:72,objectFit:"cover",borderRadius:4,flexShrink:0}}/>`}
                      <div style=${{flex:1,minWidth:0}}>
                        <p style=${{fontSize:11,color:MT,fontFamily:FFB,lineHeight:1.6,marginBottom:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${item.prompt.slice(0,100)}...</p>
                        <div style=${{display:"flex",gap:6}}>
                          <button onClick=${()=>setCsImagePrompt(item.prompt)} style=${{fontSize:10,color:GD,background:"none",border:`1px solid ${BO}`,cursor:"pointer",padding:"4px 10px",borderRadius:3,fontFamily:FFB}}>Use</button>
                          <button onClick=${()=>navigator.clipboard.writeText(item.prompt)} style=${{fontSize:10,color:MT,background:"none",border:`1px solid ${BO}`,cursor:"pointer",padding:"4px 10px",borderRadius:3,fontFamily:FFB}}>Copy</button>
                        </div>
                      </div>
                    </div>`)}
                </div>`}

              <!-- EXPORT + RESET -->
              <div style=${{display:"flex",gap:12,flexWrap:"wrap",marginBottom:32}}>
                <button onClick=${()=>{
                  const txt=["THE CREATOR STYLIST — SHOOT BRIEF","━".repeat(50),"","▸ SHOOT TYPE: "+(csFields.shootType||"influencer").toUpperCase(),"","▸ CONCEPT","━".repeat(50),csConcept,"","▸ SCENES","━".repeat(50),csScenes,"","▸ PRODUCTION DIRECTION","━".repeat(50),csProduction,"","▸ CONTENT PACKAGE","━".repeat(50),csContent,"","▸ CONTINUITY LOCK","━".repeat(50),csContinuityLock||"Not yet generated","","▸ IMAGE PROMPT","━".repeat(50),csImagePrompt].join("
");
                  const blob=new Blob([txt],{type:"text/plain"});
                  const url=URL.createObjectURL(blob);
                  const a=document.createElement("a");a.href=url;a.download="creator-stylist-shoot-brief.txt";a.click();URL.revokeObjectURL(url);
                }} style=${{background:"none",border:`1px solid ${GD}`,color:GD,cursor:"pointer",fontSize:12,padding:"13px 28px",borderRadius:4,fontFamily:FFB,letterSpacing:1,fontWeight:600}}>
                  ↓ Export Full Shoot Brief
                </button>
                <button onClick=${()=>{setCsStep(0);setCsConcept("");setCsScenes("");setCsProduction("");setCsContent("");setCsImage("");setCsImagePrompt("");setCsErr("");setCsFields({});setCsContinuityLock("");setCsHookSelected("");}} style=${{background:"none",border:`1px solid ${BO}`,color:MT,cursor:"pointer",fontSize:12,padding:"13px 24px",borderRadius:4,fontFamily:FFB}}>
                  ↺ Start New Shoot
                </button>
              </div>`}

          </div>
        </div>`}
      </main>`}


      <footer style=${{background:IV,borderTop:`1px solid ${BO}`,padding:"20px 24px",textAlign:"center"}}>
        <p style=${{fontSize:9,color:MT,letterSpacing:3,fontFamily:FFB}}>CREATOR SUITE · A PRIVATE SYSTEM FOR CREATORS WHO SELL WITH PRECISION</p>
      </footer>
    </div>
  `;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);

  </script>
</body>
</html>
